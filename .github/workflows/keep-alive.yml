name: Keep Alive
on:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update heartbeat
        run: |
          date -u > .heartbeat
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .heartbeat
          git diff --cached --quiet || git commit -m "chore: keep-alive heartbeat" && git push
