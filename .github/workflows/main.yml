name: Build and Deploy
on:
  schedule:
      - cron: '30 23 * * *'
  watch:
      types: started
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10' 
        cache: 'pip'
    - run: pip install -r requirements.txt
    - run: python wx.py

    - name: Deploy 🚀
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: .
